<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>La Alicia — Lotes</title>
<style>
:root {
  --bg:#0d1117; --surf:#161c26; --surf2:#1e2635; --bord:rgba(255,255,255,0.08);
  --txt:#eef0f4; --txt2:#8a95a8; --acc:#d4a853; --grn:#8dc468;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;background:var(--bg);color:var(--txt)}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:100;height:50px;background:var(--bg);border-bottom:1px solid var(--bord);display:flex;align-items:center;padding:0 14px;gap:10px}
#hdr h1{font-size:17px;font-weight:700;letter-spacing:-0.3px;flex:1}
#hdr h1 em{font-style:normal;color:var(--acc)}
#hdr-right{display:flex;gap:6px;align-items:center}

/* CAMPO TABS */
#ctabs{position:fixed;top:50px;left:0;right:0;z-index:99;background:var(--surf);border-bottom:1px solid var(--bord);display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
#ctabs::-webkit-scrollbar{display:none}
.ctab{flex:none;padding:8px 16px;font-size:11.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.ctab.on{color:var(--acc);border-bottom-color:var(--acc)}

/* CANVAS CONTAINER */
#map-wrap{position:fixed;top:90px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;touch-action:none}
#map-wrap.grabbing{cursor:grabbing}
#cv{display:block;width:100%;height:100%}

/* YEAR PILL */
#ypill{position:fixed;top:98px;left:10px;z-index:50;background:rgba(13,17,23,.88);backdrop-filter:blur(10px);border:1px solid var(--bord);border-radius:10px;padding:5px 3px;display:flex;flex-direction:column;gap:1px}
.ybtn{padding:4px 10px;font-size:11px;font-weight:600;color:var(--txt2);cursor:pointer;border-radius:6px;transition:all .15s;white-space:nowrap}
.ybtn.on{background:var(--acc);color:#000}

/* LEGEND */
#leg{position:fixed;bottom:22px;right:10px;z-index:50;background:rgba(13,17,23,.88);backdrop-filter:blur(10px);border:1px solid var(--bord);border-radius:10px;padding:9px 11px;min-width:120px}
#leg h4{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--txt2);margin-bottom:6px}
.li{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:11px;color:var(--txt)}
.ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* PANEL */
#pnl{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--surf);border-top:1px solid var(--bord);border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .32s cubic-bezier(.25,.8,.25,1);max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
#pnl.open{transform:translateY(0)}
#pnl-handle{width:34px;height:4px;border-radius:2px;background:var(--bord);margin:9px auto 0;flex-shrink:0;cursor:pointer}
#pclose{position:absolute;top:10px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--surf2);border:1px solid var(--bord);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--txt2);z-index:10}
#phdr{padding:10px 14px 8px;border-bottom:1px solid var(--bord);flex-shrink:0}
#ptitle{font-size:17px;font-weight:700;letter-spacing:-.2px}
#pmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
.chip{background:var(--surf2);border-radius:6px;padding:3px 8px;font-size:11px;color:var(--txt2);display:flex;align-items:center;gap:4px}
.chip .cd{width:7px;height:7px;border-radius:2px}
/* Panel tabs */
#ptabs{display:flex;border-bottom:1px solid var(--bord);padding:0 14px;flex-shrink:0}
.ptab{padding:8px 12px;font-size:11.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.ptab.on{color:var(--acc);border-bottom-color:var(--acc)}
/* Panel body */
#pbody{flex:1;overflow-y:auto;padding:12px 14px 28px;-webkit-overflow-scrolling:touch}

/* PULV */
.pg{margin-bottom:16px}
.pgh{font-size:11.5px;font-weight:700;color:var(--txt2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:7px}
.pgh::after{content:'';flex:1;height:1px;background:var(--bord)}
.pc{background:var(--surf2);border-radius:9px;padding:10px 12px;margin-bottom:7px;border-left:3px solid transparent}
.pc.ok{border-left-color:var(--grn)}.pc.an{border-left-color:#ef5350;opacity:.6}.pc.su{border-left-color:#ff9800;opacity:.7}.pc.pe{border-left-color:#42a5f5}
.ptop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px}
.pdate{font-size:13px;font-weight:600}.pcult{font-size:11px;color:var(--txt2);margin-top:1px}
.badge{font-size:9px;font-weight:700;letter-spacing:.6px;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.bok{background:rgba(141,196,104,.15);color:var(--grn)}.ban{background:rgba(239,83,80,.15);color:#ef5350}.bsu{background:rgba(255,152,0,.15);color:#ff9800}.bpe{background:rgba(66,165,245,.15);color:#42a5f5}
.pobs{font-size:11px;color:var(--acc);font-style:italic;margin-bottom:5px}
.prow{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}
.prname{color:var(--txt)}.prdos{font-size:11px;color:var(--txt2)}
.prec{font-size:10px;color:var(--txt2);margin-top:4px}

/* SUELOS */
.sy{margin-bottom:14px}
.sytitle{font-size:12.5px;font-weight:700;color:var(--acc);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.sytitle::after{content:'';flex:1;height:1px;background:var(--bord)}
.stbl{width:100%;border-collapse:collapse;font-size:11.5px}
.stbl th{text-align:left;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--txt2);padding:4px 7px;border-bottom:1px solid var(--bord)}
.stbl td{padding:4px 7px;color:var(--txt);border-bottom:1px solid rgba(255,255,255,.04)}
.stbl tr:last-child td{border-bottom:none}
.sarch{font-size:10px;color:var(--txt2);margin-top:3px}

.empty{text-align:center;padding:28px 14px;color:var(--txt2);font-size:13px}
</style>
</head>

<div id="hdr">

</div>

<div id="ctabs">

</div>

// ── CROP CONFIG ──
const CC={
  trigo:'#ef6c6c',cebada:'#f48fb1',cebad:'#f48fb1',girasol:'#fdd835',
  maiz:'#7bba4a',maíz:'#7bba4a',soja:'#4aad6e',
  cn:'#6b8f5e',avena:'#b8c98a',sorgo:'#c4783a',
  pisingallo:'#e8a840','rye grass':'#9ab87a','rye':'#9ab87a',default:'#607d8b'
};
const CL={
  trigo:'Trigo',cebada:'Cebada',cebad:'Cebada',girasol:'Girasol',
  maiz:'Maíz',maíz:'Maíz',soja:'Soja',cn:'Campo Nat.',
  avena:'Avena',sorgo:'Sorgo',pisingallo:'Pisingallo',
  'rye grass':'Rye Grass','rye':'Rye Grass',default:'Sin datos'
};
function ck(v){
  if(!v||v==='null'||v==='None'||v===null)return'default';
  const s=v.toLowerCase().trim();
  if(s.includes('trigo'))return'trigo';
  if(s.includes('cebad'))return'cebada';
  if(s.includes('girasol'))return'girasol';
  if(s.includes('maiz')||s.includes('maíz'))return'maiz';
  if(s.includes('soja'))return'soja';
  if(s.includes('cn')||s.includes('campo nat')||s.includes('pastura'))return'cn';
  if(s.includes('avena'))return'avena';
  if(s.includes('sorgo'))return'sorgo';
  if(s.includes('pisingallo'))return'pisingallo';
  if(s.includes('rye'))return'rye';
  return'default';
}
const cc=v=>CC[ck(v)]||CC.default;
const cl=v=>CL[ck(v)]||v||'—';

// ── STATE ──
let yr='r26', campo='fina_la_turca', selLote=null, activeTab='pulv';

// ── MAP STATE ──
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let vp={x:0,y:0,scale:1}; // viewport offset in geo units, scale px/deg

// Compute initial transform from all lotes
function initVP(){
  const lotes=visLotes();
  if(!lotes.length)return;
  let minLon=Infinity,maxLon=-Infinity,minLat=Infinity,maxLat=-Infinity;
  lotes.forEach(l=>l.rings.forEach(r=>r.forEach(([lon,lat])=>{
    if(Math.abs(lon)<1)return;
    if(lon<minLon)minLon=lon; if(lon>maxLon)maxLon=lon;
    if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat;
  })));
  const W=cv.width,H=cv.height;
  const pad=40;
  const sx=(W-pad*2)/(maxLon-minLon);
  const sy=(H-pad*2)/(maxLat-minLat);
  vp.scale=Math.min(sx,sy);
  vp.cx=(minLon+maxLon)/2;
  vp.cy=(minLat+maxLat)/2;
}

function lonLatToXY(lon,lat){
  const W=cv.width,H=cv.height;
  const x=W/2+(lon-vp.cx)*vp.scale;
  const y=H/2-(lat-vp.cy)*vp.scale;
  return[x,y];
}
function xyToLonLat(x,y){
  const W=cv.width,H=cv.height;
  return[(x-W/2)/vp.scale+vp.cx,(H/2-y)/vp.scale+vp.cy];
}

// ── RESIZE ──
function resize(){
  const w=cv.parentElement.clientWidth;
  const h=cv.parentElement.clientHeight;
  if(cv.width!==w||cv.height!==h){
    cv.width=w; cv.height=h;
    initVP(); draw();
  }
}

// ── FILTER ──
function visLotes(){
  return D.lotes.filter(l=>campo==='all'||l.layer===campo);
}

// ── DRAW ──
function draw(){
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0a0d12';
  ctx.fillRect(0,0,W,H);

  const lotes=visLotes();
  lotes.forEach(l=>{
    const val=l[yr];
    const fill=cc(val);
    const isSel=selLote&&selLote.name===l.name&&selLote.layer===l.layer;

    l.rings.forEach(ring=>{
      ctx.beginPath();
      ring.forEach(([lon,lat],i)=>{
        if(Math.abs(lon)<1)return;
        const[x,y]=lonLatToXY(lon,lat);
        i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
      });
      ctx.closePath();
      ctx.fillStyle=fill+(isSel?'ee':'99');
      ctx.fill();
      ctx.strokeStyle=isSel?'#fff':'rgba(255,255,255,0.35)';
      ctx.lineWidth=isSel?2.5:1;
      ctx.stroke();
    });

    // Label: lote name + cultivo
    const[cx2,cy2]=ringCentroid(l.rings[0]);
    if(cx2){
      const[px,py]=lonLatToXY(cx2,cy2);
      const areaHa=parseFloat(l.area)||0;
      const minArea=vp.scale<200?30:10;
      if(areaHa>=minArea){
        ctx.save();
        ctx.fillStyle='rgba(0,0,0,0.5)';
        const nm=l.name.toUpperCase();
        ctx.font=`bold ${Math.max(9,Math.min(13,areaHa/8+7))}px -apple-system,sans-serif`;
        const tw=ctx.measureText(nm).width;
        const rx=px-tw/2-3,ry=py-8,rw=tw+6,rh=12,rr=3;
        ctx.beginPath();ctx.moveTo(rx+rr,ry);ctx.lineTo(rx+rw-rr,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+rr,rr);ctx.lineTo(rx+rw,ry+rh-rr);ctx.arcTo(rx+rw,ry+rh,rx+rw-rr,ry+rh,rr);ctx.lineTo(rx+rr,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-rr,rr);ctx.lineTo(rx,ry+rr);ctx.arcTo(rx,ry,rx+rr,ry,rr);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff';
        ctx.textAlign='center';
        ctx.textBaseline='middle';
        ctx.fillText(nm,px,py-2);
        if(val&&val!=='null'&&val!==null){
          ctx.font=`${Math.max(8,Math.min(11,areaHa/10+6))}px -apple-system,sans-serif`;
          ctx.fillStyle='rgba(255,255,255,0.7)';
          ctx.fillText(cl(val),px,py+8);
        }
        ctx.restore();
      }
    }
  });
  buildLegend();
}

function ringCentroid(ring){
  if(!ring||!ring.length)return[null,null];
  let sx=0,sy=0,n=0;
  ring.forEach(([lon,lat])=>{if(Math.abs(lon)>1){sx+=lon;sy+=lat;n++;}});
  return n?[sx/n,sy/n]:[null,null];
}

// ── HIT TEST ──
function hitTest(px,py){
  const[lon,lat]=xyToLonLat(px,py);
  const lotes=visLotes();
  for(let i=lotes.length-1;i>=0;i--){
    const l=lotes[i];
    for(const ring of l.rings){
      if(pointInRing(lon,lat,ring))return l;
    }
  }
  return null;
}

function pointInRing(x,y,ring){
  let inside=false;
  for(let i=0,j=ring.length-1;i<ring.length;j=i++){
    const[xi,yi]=ring[i],[xj,yj]=ring[j];
    if(Math.abs(xi)<1||Math.abs(xj)<1)continue;
    if((yi>y)!==(yj>y)&&x<(xj-xi)*(y-yi)/(yj-yi)+xi)inside=!inside;
  }
  return inside;
}

// ── LEGEND ──
function buildLegend(){
  const seen=new Set();
  visLotes().forEach(l=>{const k=ck(l[yr]);if(k!=='default')seen.add(k);});
  document.getElementById('legitems').innerHTML=[...seen].map(k=>
    `<div class="li"><div class="ld" style="background:${CC[k]||CC.default}"></div>${CL[k]||k}</div>`
  ).join('');
}

// ── TABS ──
document.querySelectorAll('.ctab').forEach(t=>t.addEventListener('click',()=>{
  campo=t.dataset.campo;
  document.querySelectorAll('.ctab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  closeP(); initVP(); draw();
}));
document.querySelectorAll('.ybtn').forEach(b=>b.addEventListener('click',()=>{
  yr=b.dataset.yr;
  document.querySelectorAll('.ybtn').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  draw();
}));
document.querySelectorAll('.ptab').forEach(t=>t.addEventListener('click',()=>{
  activeTab=t.dataset.tab;
  document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  renderTab();
}));

// ── PANEL ──
function openP(lote){
  selLote=lote;
  const CL2={fina_la_manga:'La Manga',fina_la_turca:'La Turca',fina_san_fermin:'San Fermín',fina_becutti:'Becutti'};
  document.getElementById('ptitle').textContent=lote.name.toUpperCase()+' — '+(CL2[lote.layer]||lote.layer);
  const yrLabel={r26:'2026',r25:'2025',r24:'2024',r23:'2023'}[yr];
  const val=lote[yr];
  document.getElementById('pmeta').innerHTML=
    `<div class="chip"><div class="cd" style="background:${cc(val)}"></div>${cl(val)} ${yrLabel}</div>`+
    `<div class="chip">📐 ${lote.area} ha</div>`+
    (lote.r25?`<div class="chip">↩ ${cl(lote.r25)} 2025</div>`:'');
  document.getElementById('pnl').classList.add('open');
  draw();
  renderTab();
}
function closeP(){
  document.getElementById('pnl').classList.remove('open');
  selLote=null; draw();
}
function renderTab(){
  if(activeTab==='pulv')renderPulv();
  else renderSuelos();
}

// ── PULV ──
const MONTHS=['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function pulvKey(lote){
  const pfx={fina_la_manga:'lm',fina_la_turca:'lt',fina_san_fermin:'sf',fina_becutti:'b'};
  const p=pfx[lote.layer]||'';
  const campoData=D.pulv[lote.layer]||{};
  let num=lote.name.replace(new RegExp('^'+p,'i'),'').replace(/^_/,'')
    .replace(/_bajo$/i,'').replace(/_juncos$/i,'').replace(/_ch$/i,'')
    .replace(/_gr$/i,'').replace(/_ls$/i,'');
  if(campoData['LOTE '+num]) return 'LOTE '+num;
  if(campoData['LOTE '+num.toUpperCase()]) return 'LOTE '+num.toUpperCase();
  return 'LOTE '+num.toUpperCase();
}

function renderPulv(){
  const body=document.getElementById('pbody');
  const campoData=D.pulv[selLote.layer];
  if(!campoData){body.innerHTML=`<div class="empty">Sin datos de pulverizaciones</div>`;return;}

  const key=pulvKey(selLote);
  let apps=campoData[key];

  // Fallback: try stripped number matching
  if(!apps||!apps.length){
    const num=key.replace('LOTE ','').trim().toLowerCase();
    for(const[k,v] of Object.entries(campoData)){
      if(k.replace('LOTE ','').trim().toLowerCase()===num){apps=v;break;}
    }
  }
  if(!apps||!apps.length){
    body.innerHTML=`<div class="empty">Sin pulverizaciones registradas para ${key}</div>`;
    return;
  }

  const groups={};
  apps.forEach(a=>{
    const pts=a.f.split('/');
    const mk=pts[1]+'/'+pts[2];
    if(!groups[mk])groups[mk]=[];
    groups[mk].push(a);
  });

  let html='';
  for(const[mk,list] of Object.entries(groups)){
    const[m,y2]=mk.split('/');
    html+=`<div class="pg"><div class="pgh">${MONTHS[+m]||m} ${y2}</div>`;
    list.forEach(a=>{
      const est=(a.e||'').toLowerCase();
      let cls='ok',bc='bok';
      if(est.includes('anulado')){cls='an';bc='ban';}
      else if(est.includes('suspendido')){cls='su';bc='bsu';}
      else if(est.includes('pendiente')){cls='pe';bc='bpe';}
      html+=`<div class="pc ${cls}">
        <div class="ptop">
          <div><div class="pdate">${a.f}</div><div class="pcult">${a.c||''}</div></div>
          <span class="badge ${bc}">${a.e||''}</span>
        </div>
        ${a.o?`<div class="pobs">📝 ${a.o}</div>`:''}
        <div>${(a.p||[]).map(p=>`<div class="prow"><span class="prname">• ${p.n}</span><span class="prdos">${p.d} l/ha</span></div>`).join('')}</div>
        ${a.r?`<div class="prec">Rec. N° ${a.r}</div>`:''}
      </div>`;
    });
    html+='</div>';
  }
  body.innerHTML=html||`<div class="empty">Sin registros</div>`;
}

// ── SUELOS ──
function suelosKey(lote){
  const pfx={fina_la_manga:'lm',fina_la_turca:'lt',fina_san_fermin:'sf',fina_becutti:'b'};
  const p=pfx[lote.layer]||'';
  let num=lote.name.replace(new RegExp('^'+p,'i'),'').replace(/^_/,'');
  const campoDB=D.suelos[lote.layer];
  if(!campoDB)return null;
  const keys=Object.keys(campoDB);
  // Try exact
  if(campoDB[num])return num;
  const nl=num.toLowerCase();
  for(const k of keys){
    const kl=k.toLowerCase().replace(/\s/g,'');
    if(kl===nl||kl===nl.replace('.',''))return k;
  }
  return null;
}

function renderSuelos(){
  const body=document.getElementById('pbody');
  const campoDB=D.suelos[selLote.layer];
  if(!campoDB){body.innerHTML=`<div class="empty">Sin análisis de suelos para este campo</div>`;return;}
  const key=suelosKey(selLote);
  if(!key){body.innerHTML=`<div class="empty">Sin análisis de suelos para este lote</div>`;return;}
  const analisis=campoDB[key];
  if(!analisis){body.innerHTML=`<div class="empty">Sin datos</div>`;return;}

  const PARAMS=['N-NO3','Fósforo','N Min.','S-Sulfato','MO','Zinc','pH','Humedad','Boro'];
  let html='';
  Object.keys(analisis).sort((a,b)=>b-a).forEach(yr2=>{
    const an=analisis[yr2];
    const perf=an.perfiles||[];
    if(!perf.length)return;
    const cols=PARAMS.filter(p=>perf.some(r=>r[p]!==undefined));
    html+=`<div class="sy"><div class="sytitle">Análisis ${yr2}</div>
      <table class="stbl"><thead><tr><th>Prof.</th>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead>
      <tbody>${perf.map(r=>`<tr><td><b>${r.prof}</b></td>${cols.map(c=>`<td>${r[c]!==undefined?r[c]:'—'}</td>`).join('')}</tr>`).join('')}</tbody>
      </table><div class="sarch">${an.archivo}</div></div>`;
  });
  body.innerHTML=html||`<div class="empty">Sin datos</div>`;
}

// ── PAN & ZOOM (pointer events) ──
let drag={on:false,sx:0,sy:0,scx:0,scy:0};
let pinch={on:false,d0:0,sc0:0};

function ptrDist(e){
  const pts=[...e.touches];
  if(pts.length<2)return 0;
  const dx=pts[1].clientX-pts[0].clientX,dy=pts[1].clientY-pts[0].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

cv.addEventListener('pointerdown',e=>{
  if(e.isPrimary){
    drag={on:true,sx:e.clientX,sy:e.clientY,scx:vp.cx,scy:vp.cy};
    cv.setPointerCapture(e.pointerId);
    document.getElementById('map-wrap').classList.add('grabbing');
  }
});
cv.addEventListener('pointermove',e=>{
  if(drag.on&&e.isPrimary){
    const dx=(e.clientX-drag.sx)/vp.scale;
    const dy=(e.clientY-drag.sy)/vp.scale;
    vp.cx=drag.scx-dx;
    vp.cy=drag.scy+dy;
    draw();
  }
});
cv.addEventListener('pointerup',e=>{
  if(e.isPrimary){
    const moved=Math.abs(e.clientX-drag.sx)>5||Math.abs(e.clientY-drag.sy)>5;
    drag.on=false;
    document.getElementById('map-wrap').classList.remove('grabbing');
    if(!moved){
      const rect=cv.getBoundingClientRect();
      const px=e.clientX-rect.left,py=e.clientY-rect.top;
      const hit=hitTest(px,py);
      if(hit)openP(hit);
      else closeP();
    }
  }
});

// Touch pinch zoom
cv.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinch={on:true,d0:ptrDist(e),sc0:vp.scale};
  }
},{passive:true});
cv.addEventListener('touchmove',e=>{
  if(pinch.on&&e.touches.length===2){
    const d=ptrDist(e);
    vp.scale=pinch.sc0*(d/pinch.d0);
    draw();
  }
},{passive:true});
cv.addEventListener('touchend',()=>{pinch.on=false;});

// Mouse wheel zoom
cv.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=cv.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const[lon,lat]=xyToLonLat(mx,my);
  const factor=e.deltaY<0?1.15:1/1.15;
  vp.scale*=factor;
  // Keep mouse position fixed
  const[nx,ny]=lonLatToXY(lon,lat);
  vp.cx+=(nx-mx)/vp.scale;
  vp.cy-=(ny-my)/vp.scale;
  draw();
},{passive:false});

// Panel swipe down
let ts=0;
document.getElementById('pnl').addEventListener('touchstart',e=>{ts=e.touches[0].clientY;},{passive:true});
document.getElementById('pnl').addEventListener('touchend',e=>{
  if(e.changedTouches[0].clientY-ts>60)closeP();
},{passive:true});

// ── INIT ──
function init(){
  resize();
  initVP();
  draw();
}
window.addEventListener('resize',()=>{resize();});
init();
</script>
