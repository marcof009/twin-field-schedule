name: Actualizar datos del campo

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python y dependencias
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar librerías
        run: |
          pip install geopandas pandas openpyxl shapely pyproj fiona

      - name: Generar JSONs
        run: python generate_data.py

      - name: Commitear y pushear
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --staged --quiet || git commit -m "Auto: actualizar datos"
          git pull --rebase origin main
          git push
